---
# Git Credentials Secret Template
# Replace the base64 encoded values with your actual credentials
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    tekton.dev/git-0: https://github.com
    description: "Git credentials for source and GitOps repositories"
type: kubernetes.io/basic-auth
stringData:
  username: <GIT_USERNAME>
  password: <GIT_TOKEN_OR_PASSWORD>
# For SSH authentication, use this format instead:
# type: kubernetes.io/ssh-auth
# data:
#   ssh-privatekey: <BASE64_ENCODED_SSH_KEY>
#   known_hosts: <BASE64_ENCODED_KNOWN_HOSTS>

---
# Container Registry Credentials Secret Template
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    description: "Container registry credentials for pushing images"
type: kubernetes.io/dockerconfigjson
stringData:
  config.json: |
    {
      "auths": {
        "quay.io": {
          "username": "<REGISTRY_USERNAME>",
          "password": "<REGISTRY_PASSWORD>",
          "email": "<REGISTRY_EMAIL>",
          "auth": "<BASE64_ENCODED_USERNAME:PASSWORD>"
        }
      }
    }

---
# Alternative: Using .dockerconfigjson format
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials-alt
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
# To generate the base64 encoded docker config:
# cat ~/.docker/config.json | base64 -w 0

---
# Webhook Secret for Tekton Triggers
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    description: "Secret for validating webhook requests"
type: Opaque
stringData:
  secretToken: <RANDOM_SECRET_TOKEN>
# Generate a random token:
# openssl rand -hex 20

---
# ArgoCD Credentials (if needed for direct API access)
apiVersion: v1
kind: Secret
metadata:
  name: argocd-credentials
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    description: "ArgoCD API credentials"
type: Opaque
stringData:
  server: <ARGOCD_SERVER_URL>
  username: <ARGOCD_USERNAME>
  password: <ARGOCD_PASSWORD>
  token: <ARGOCD_API_TOKEN>

---
# Database Credentials (for application)
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    description: "Database credentials for the application"
type: Opaque
stringData:
  DB_HOST: postgresql.database.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: saas_portal
  DB_USER: <DB_USERNAME>
  DB_PASSWORD: <DB_PASSWORD>

---
# Instructions for creating secrets
# 
# 1. Git Credentials (HTTPS):
#    oc create secret generic git-credentials \
#      --from-literal=username=<your-git-username> \
#      --from-literal=password=<your-git-token> \
#      -n saas-cicd
#    
#    oc annotate secret git-credentials \
#      tekton.dev/git-0=https://github.com \
#      -n saas-cicd
#
# 2. Git Credentials (SSH):
#    oc create secret generic git-credentials \
#      --from-file=ssh-privatekey=~/.ssh/id_rsa \
#      --from-file=known_hosts=~/.ssh/known_hosts \
#      --type=kubernetes.io/ssh-auth \
#      -n saas-cicd
#
# 3. Registry Credentials:
#    oc create secret docker-registry registry-credentials \
#      --docker-server=quay.io \
#      --docker-username=<your-username> \
#      --docker-password=<your-password> \
#      --docker-email=<your-email> \
#      -n saas-cicd
#
# 4. Link secrets to service account:
#    oc secrets link pipeline-sa git-credentials -n saas-cicd
#    oc secrets link pipeline-sa registry-credentials -n saas-cicd
#
# 5. Webhook Secret:
#    oc create secret generic webhook-secret \
#      --from-literal=secretToken=$(openssl rand -hex 20) \
#      -n saas-cicd

