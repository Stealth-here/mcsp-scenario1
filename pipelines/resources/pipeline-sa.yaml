---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
  annotations:
    description: "Service account for Tekton pipeline execution"
secrets:
  - name: git-credentials
  - name: registry-credentials

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-role
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
rules:
  # Allow pipeline to manage its own resources
  - apiGroups: ["tekton.dev"]
    resources: ["*"]
    verbs: ["*"]
  
  # Allow pipeline to create and manage pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  
  # Allow pipeline to manage PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  
  # Allow pipeline to read secrets and configmaps
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  
  # Allow pipeline to create events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-role-binding
  namespace: saas-cicd
  labels:
    app: saas-customer-portal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-role
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: saas-cicd

---
# ClusterRole for cross-namespace operations (if needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-cluster-role
  labels:
    app: saas-customer-portal
rules:
  # Allow reading cluster-wide resources
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  
  # Allow managing ArgoCD applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-cluster-role-binding
  labels:
    app: saas-customer-portal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-cluster-role
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: saas-cicd

---
# SCC for privileged operations (OpenShift specific)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: pipeline-scc
  labels:
    app: saas-customer-portal
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: true
allowedCapabilities:
  - SETUID
  - SETGID
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities: null
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:saas-cicd:pipeline-sa
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret

