---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: saas-app-resource-policy
  namespace: open-cluster-management
  labels:
    app: saas-customer-portal
    policy-type: resource-management
spec:
  disabled: false
  remediationAction: enforce
  
  policy-templates:
    # Enforce resource quotas
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: saas-app-resource-quota
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ResourceQuota
                metadata:
                  name: saas-app-quota
                  namespace: saas-app-prod
                spec:
                  hard:
                    requests.cpu: "10"
                    requests.memory: 20Gi
                    limits.cpu: "20"
                    limits.memory: 40Gi
                    persistentvolumeclaims: "10"
                    services.loadbalancers: "2"
    
    # Enforce limit ranges
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: saas-app-limit-range
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: LimitRange
                metadata:
                  name: saas-app-limits
                  namespace: saas-app-prod
                spec:
                  limits:
                    - type: Container
                      default:
                        cpu: 500m
                        memory: 512Mi
                      defaultRequest:
                        cpu: 100m
                        memory: 128Mi
                      max:
                        cpu: "2"
                        memory: 2Gi
                      min:
                        cpu: 50m
                        memory: 64Mi
                    - type: Pod
                      max:
                        cpu: "4"
                        memory: 4Gi
    
    # Enforce pod disruption budget
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: saas-app-pdb
        spec:
          remediationAction: inform
          severity: low
          namespaceSelector:
            include:
              - saas-app-prod
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: policy/v1
                kind: PodDisruptionBudget
                metadata:
                  name: saas-customer-portal-pdb
                  namespace: saas-app-prod
                spec:
                  minAvailable: 1
                  selector:
                    matchLabels:
                      app: saas-customer-portal
