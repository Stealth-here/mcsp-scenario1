---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saas-customer-portal-tls
  namespace: saas-app-prod
  labels:
    app: saas-customer-portal
spec:
  secretName: saas-customer-portal-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - saas-portal.example.com
    - www.saas-portal.example.com
    - api.saas-portal.example.com
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - digital signature
    - key encipherment
    - server auth

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saas-customer-portal-staging-tls
  namespace: saas-app-staging
  labels:
    app: saas-customer-portal
spec:
  secretName: saas-customer-portal-staging-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - staging.saas-portal.example.com
  duration: 2160h
  renewBefore: 360h

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saas-customer-portal-dev-tls
  namespace: saas-app-dev
  labels:
    app: saas-customer-portal
spec:
  secretName: saas-customer-portal-dev-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - dev.saas-portal.example.com
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
