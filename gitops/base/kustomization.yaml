---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: saas-customer-portal-base
  annotations:
    description: "Base Kubernetes manifests for SaaS Customer Portal"

namespace: saas-app

# Common labels applied to all resources
commonLabels:
  app: saas-customer-portal
  managed-by: argocd
  part-of: mcsp-scenario1

# Common annotations applied to all resources
commonAnnotations:
  app.kubernetes.io/name: saas-customer-portal
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/component: backend
  app.kubernetes.io/managed-by: argocd

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml
  - configmap.yaml

# ConfigMap generator for environment-specific configs
configMapGenerator:
  - name: app-config
    literals:
      - APP_NAME=saas-customer-portal
      - APP_VERSION=1.0.0
      - LOG_LEVEL=INFO
      - METRICS_ENABLED=true

# Images to be used (can be overridden in overlays)
images:
  - name: saas-customer-portal
    newName: quay.io/mcsp/saas-customer-portal
    newTag: latest

# Made with Bob
