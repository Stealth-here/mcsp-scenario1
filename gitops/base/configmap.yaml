---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: saas-customer-portal
data:
  APP_NAME: "saas-customer-portal"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  METRICS_ENABLED: "true"
  CORS_ORIGINS: "*"
  RATE_LIMIT_ENABLED: "false"
  CACHE_ENABLED: "false"
  DB_ENABLED: "false"
  CHECK_DB_HEALTH: "false"
