---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: saas-app-dev

namePrefix: dev-

commonLabels:
  environment: dev
  tier: development

bases:
  - ../../base

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - DEBUG=true

replicas:
  - name: saas-customer-portal
    count: 1

images:
  - name: saas-customer-portal
    newName: quay.io/likithrd/saas-customer-portal
    newTag: dev-latest
