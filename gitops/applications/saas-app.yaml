---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saas-customer-portal-dev
  namespace: openshift-gitops
  labels:
    app: saas-customer-portal
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/example/saas-gitops.git
    targetRevision: main
    path: gitops/overlays/dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: saas-app-dev
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saas-customer-portal-staging
  namespace: openshift-gitops
  labels:
    app: saas-customer-portal
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: saas-deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/example/saas-gitops.git
    targetRevision: main
    path: gitops/overlays/staging
  
  destination:
    server: https://kubernetes.default.svc
    namespace: saas-app-staging
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saas-customer-portal-production
  namespace: openshift-gitops
  labels:
    app: saas-customer-portal
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: saas-production
    notifications.argoproj.io/subscribe.on-sync-failed.slack: saas-production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/example/saas-gitops.git
    targetRevision: main
    path: gitops/overlays/production
  
  destination:
    server: https://kubernetes.default.svc
    namespace: saas-app-prod
  
  syncPolicy:
    # Manual sync for production - requires approval
    automated: null
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10

